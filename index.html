<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday My Love ❤️</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="hearts"></div>

    <section id="welcome">
        <h1 class="title">🎂 Happy 19th Birthday, Shwe" ❤️</h1>
        <p class="subtitle">
            မောင့်အတွက် မမ,ကအရေးအကြီးဆုံးသူလေးမို့ ဒီ Web page ကို မမ,အတွက်အမှတ်တရကောင်းဖြစ်အောင် ဖန်တီးပေးလိုက်ခြင်းဖြစ်တယ်။
        </p>
        <button id="startBtn">Open Memories 💕</button>
    </section>

    <section id="sliderSection" class="hidden">

        <div class="card">
            <img id="slideImage" src="" alt="Memory Photo">

            <div class="content">
                <h2 id="slideNumber"></h2>
                <p id="slideText"></p>
            </div>
        </div>

        <div class="buttons">
            <button id="prevBtn">⬅ Previous</button>
            <button id="nextBtn">Next ➡</button>
        </div>

    </section>

    <section id="finalSection" class="hidden">
        <h1>မောင့်ဆီမှ အထူးမွေးနေ့လက်ဆောင်</h1>

        <p>
            မမ, မကြိုက်တာမှန်သမျှ မောင်ရှောင်ကြည်ပြီး မမ စကားကို မြေဝယ်မကျ နားထောင်ပါ့မယ်
        </p>

        <h2>❤️ Forever yours, Pupi ❤️</h2>
    </section>

    <script src="script.js"></script>
</body>
</html>
